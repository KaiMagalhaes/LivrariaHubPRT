<!doctype html>
<html lang="pt-pt" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/comic.png" type="image/x-icon" />
    <title>LibriFlow | Início</title>
    <!-- --------------------------------------LINKS------------------------------------------ -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- -----------------------------------------------NAVBAR--------------------------------------------->
    <nav class="navbar navbar-expand-lg sticky-top" id="navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="img/comic.png" width="40px" />
          LibriFlow
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navConteudo"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navConteudo">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Livros</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Sobre</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2">
            <input
              type="text"
              id="nmrBusca"
              class="form-control"
              placeholder="Procurar..."
            />
            <button class="btn btn-outline-light" id="btnTema">
              <i class="bi bi-circle-half"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>
    <!-- ------------------------------------------------Título-------------------------------------------------- -->
    <header>
      <div class="titulo text-center">
        <h1 class="mb-1">LibriFlow Portugal</h1>
        <h4 class="mb-0">
          Consulte nossos livros por ano, disciplina e localização
        </h4>
      </div>
    </header>
    <!-- --------------------------------------------------Filtros---------------------------------------------------->
    <main class="container my-5">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="row" id="lstLiv"></div>
          <select id="filtroLoc" class="form-select">
            <option value="">Todos as editoras</option>
            <option value="Braga">Porto Editora</option>
            <option value="Porto">Asa</option>
            <option value="Lisboa">Penguin Random House</option>
            <option value="Lisboa">Presença</option>
            <option value="Lisboa">Relógio D'Água</option>
            <option value="Lisboa">Booksmile</option>
            <option value="Lisboa">Novatec</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="filtroAno" class="form-select">
            <option value="">Todos os Anos</option>
            <option value="1">5º Ano</option>
            <option value="2">6º Ano</option>
            <option value="3">7º Ano</option>
            <option value="4">8º Ano</option>
            <option value="5">9º Ano</option>
            <option value="6">10º Ano</option>
            <option value="7">11º Ano</option>
            <option value="8">12º Ano</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="filtroAno" class="form-select">
            <option value="">Todos os tipos</option>
            <option value="1">Romance</option>
            <option value="2">Infantil</option>
            <option value="3">Técnico</option>
            <option value="4">Manual</option>
            <option value="5">Caderno de atividade</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="filtroAno" class="form-select">
            <option value="">Todos as disciplinas</option>
            <option value="1">Português</option>
            <option value="2">Matemática</option>
            <option value="3">Estudo do meio</option>
            <option value="4">Inglês</option>
            <option value="5">Ciências Naturais</option>
            <option value="5">Físico Química</option>
            <option value="5">Literatura</option>
            <option value="5">Tecnologia</option>
            <option value="5">Infanto-juvenil</option>
          </select>
        </div>
      </div>
    </main>

    <footer>
      <script src="index.js"></script>
    </footer>
  </body>
</html>
