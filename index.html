<!doctype html>
<html lang="pt-pt" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/comic.png" type="image/x-icon">
    <title>LibriFlow | Gestão</title>
    <!-- --------------------------------------LINKS------------------------------------------ -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- -----------------------------------------------NAVBAR--------------------------------------------->
    <nav class="navbar navbar-expand-lg sticky-top" id="navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
           <img src="img/comic.png" width="40px">
            LibriFlow

        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navConteudo"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navConteudo">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link " href="#">Livros</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Sobre</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-2">
            <input
              type="text"
              id="nmrBusca"
              class="form-control"
              placeholder="Procurar..."
            />
            <button class="btn btn-outline-light" id="btnTema">
              <i class="bi bi-circle-half"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <select id="fltLoc" class="form-select">
            <option value="">Todos os Distritos</option>
            <option value="Braga">Braga</option>
            <option value="Porto">Porto</option>
            <option value="Lisboa">Lisboa</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="fltAno" class="form-select">
            <option value="">Todos os Anos</option>
            <option value="10">10º Ano</option>
            <option value="11">11º Ano</option>
            <option value="12">12º Ano</option>
          </select>
        </div>
      </div>

      <div id="lstLiv" class="row g-4"></div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
