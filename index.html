<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivrariaHub | Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand link-animado" href="#">LivrariaHub</a>
            <input type="text" id="searchBar" class="form-control w-25" placeholder="Pesquisar livro...">
        </div>
    </nav>

    <main class="container mt-5">
        <div class="box-titulo text-center mb-4">
            <h1>O Teu Hub de Livros</h1>
            <p>Filtra por disciplina, distrito ou ano letivo.</p>
        </div>

        <div class="row g-3">
            <div class="col-md-3">
                <select id="filtroDisciplina" class="form-select">
                    <option value="">Todas as Disciplinas</option>
                    <option value="Matemática">Matemática</option>
                    <option value="Biologia">Biologia</option>
                    <option value="Português">Português</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="filtroDistrito" class="form-select">
                    <option value="">Todos os Distritos</option>
                    <option value="Braga">Braga</option>
                    <option value="Porto">Porto</option>
                    <option value="Lisboa">Lisboa</option>
                </select>
            </div>
        </div>

        <ul id="lista-livros" class="mt-4">
            </ul>
    </main>

    <script src="index.js"></script>
</body>
</html>
